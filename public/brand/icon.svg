<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="disk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
    <linearGradient id="mophead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Disk platter -->
  <circle cx="240" cy="240" r="140" fill="url(#disk)" opacity="0.9"/>
  <circle cx="240" cy="240" r="105" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <circle cx="240" cy="240" r="70" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <circle cx="240" cy="240" r="35" fill="url(#bg)" opacity="0.6"/>
  <circle cx="240" cy="240" r="12" fill="white" opacity="0.8"/>

  <!-- Shine on disk -->
  <ellipse cx="200" cy="190" rx="60" ry="30" fill="white" opacity="0.15" transform="rotate(-20 200 190)"/>

  <!-- Mop handle (diagonal) -->
  <line x1="320" y1="130" x2="430" y2="40" stroke="url(#handle)" stroke-width="18" stroke-linecap="round"/>

  <!-- Mop head -->
  <rect x="280" y="120" width="90" height="35" rx="8" fill="url(#mophead)" transform="rotate(-45 325 137)"/>

  <!-- Mop fibers -->
  <g transform="rotate(-45 325 137)">
    <line x1="288" y1="155" x2="288" y2="180" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <line x1="298" y1="155" x2="298" y2="185" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <line x1="308" y1="155" x2="308" y2="182" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <line x1="318" y1="155" x2="318" y2="187" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <line x1="328" y1="155" x2="328" y2="180" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <line x1="338" y1="155" x2="338" y2="184" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <line x1="348" y1="155" x2="348" y2="178" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <line x1="358" y1="155" x2="358" y2="183" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Sparkles -->
  <g fill="white">
    <!-- Sparkle 1 -->
    <path d="M390 220 L395 210 L400 220 L395 230 Z" opacity="0.9"/>
    <path d="M385 220 L395 215 L405 220 L395 225 Z" opacity="0.9"/>

    <!-- Sparkle 2 -->
    <path d="M150 380 L153 373 L156 380 L153 387 Z" opacity="0.7"/>
    <path d="M146 380 L153 377 L160 380 L153 383 Z" opacity="0.7"/>

    <!-- Sparkle 3 -->
    <path d="M420 310 L423 303 L426 310 L423 317 Z" opacity="0.6"/>
    <path d="M416 310 L423 307 L430 310 L423 313 Z" opacity="0.6"/>

    <!-- Small dots -->
    <circle cx="350" cy="280" r="3" opacity="0.5"/>
    <circle cx="180" cy="400" r="2.5" opacity="0.4"/>
    <circle cx="410" cy="260" r="2" opacity="0.5"/>
  </g>

  <!-- Clean sweep arc -->
  <path d="M 340 300 Q 380 350 350 400" fill="none" stroke="white" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <path d="M 360 290 Q 410 340 380 400" fill="none" stroke="white" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
</svg>
